name: Deploy to Google Cloud Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: npm run build

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy files to GCS Bucket
      run: |
        # Sync build output (dist/) with the GCS bucket, deleting deleted files from the bucket
        gcloud storage rsync dist gs://leestudymath --delete-unmatched
        
        # Set cache-control on index.html so browser/CDN never caches it (guarantees instant updates)
        gcloud storage objects update gs://leestudymath/index.html --cache-control="no-cache, no-store, must-revalidate"
        
        # Set long-term cache-control on assets (Vite assigns unique hash names, so they can be cached forever safely)
        gcloud storage objects update gs://leestudymath/assets/* --cache-control="public, max-age=31536000, immutable"
