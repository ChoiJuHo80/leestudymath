    <script>
    (function() {
        // ?ҙл? PWAлЎ??Өн–ү мӨ‘мқҙл©?л°°л„Ҳ л¶Ҳн•„??        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;
        if (isStandalone) return;

        // ?ӨлҠҳ ?ҙл? ?«м•ҳ?јл©ҙ 24?ңк°„ ?„м—җ ?ӨмӢң ?ңмӢң
        const dismissed = localStorage.getItem('pwa-banner-dismissed');
        if (dismissed && (Date.now() - parseInt(dismissed)) < 86400000) return;

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
            && !/crios/i.test(navigator.userAgent);  // Chrome on iOS ?ңмҷё
        const isAndroid = /android/i.test(navigator.userAgent);

        const banner = document.getElementById('pwa-install-banner');
        const iosBanner = document.getElementById('pwa-ios-banner');
        const androidBanner = document.getElementById('pwa-android-banner');
        const iosClose = document.getElementById('pwa-ios-close');
        const androidClose = document.getElementById('pwa-android-close');
        const androidInstallBtn = document.getElementById('pwa-android-install');

        let deferredPrompt = null;

        // Android: beforeinstallprompt ?ҙлІӨ??мәЎмІҳ
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
        });

        // Android: ?ҙлІӨ??л°ңмғқкі??Ғк??Ҷмқҙ ?јлӢЁ л°°л„Ҳ ?ңмӢң (?ҲлӮҙ??
        if (isAndroid || (!isIOS && !isAndroid)) {
            setTimeout(function() {
                banner.style.display = 'block';
                androidBanner.style.display = 'block';
            }, 3000);
        }

        // iOS Safari: м§Ғм ‘ ?ҲлӮҙ л°°л„Ҳ ?ңмӢң
        if (isIOS) {
            setTimeout(function() {
                banner.style.display = 'block';
                iosBanner.style.display = 'block';
            }, 3000);
        }

        // Android ?Өм№ҳ лІ„нҠј ?ҙлҰӯ
        if (androidInstallBtn) {
            androidInstallBtn.addEventListener('click', function() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(function(choiceResult) {
                        if (choiceResult.outcome === 'accepted') {
                            banner.style.display = 'none';
                        }
                        deferredPrompt = null;
                    });
                } else {
                    // ?ҳлҸҷ ?Өм№ҳ ?ҲлӮҙ
                    alert("?°мёЎ ?ҒлӢЁ лёҢлқј?°м? л©”лүҙ(??лҘ??„лҘҙ?ңкі \n[???”л©ҙ??м¶”к?] ?җлҠ” [???Өм№ҳ]лҘ?? нғқ?ҙмЈј?ёмҡ”!");
                }
            });
            androidInstallBtn.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.05)';
            });
            androidInstallBtn.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        }

        // ?«кё° лІ„нҠј
        function closeBanner() {
            banner.style.opacity = '0';
            banner.style.transition = 'opacity 0.3s';
            setTimeout(function() { banner.style.display = 'none'; }, 300);
            localStorage.setItem('pwa-banner-dismissed', Date.now().toString());
        }
        if (iosClose) iosClose.addEventListener('click', closeBanner);
        if (androidClose) androidClose.addEventListener('click', closeBanner);

        // Service Worker ?ұлЎқ
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(reg) { console.log('[PWA] Service Worker ?ұлЎқ ?ұкіө:', reg.scope); })
                    .catch(function(err) { console.warn('[PWA] Service Worker ?ұлЎқ ?ӨнҢЁ:', err); });
            });
        }
    })();
    </script>
